services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      - ${MUSIC_DIR:-./music}:/music
      - db_data:/app/data
    environment:
      - PORT=3001
      - MUSIC_DIR=/music
      - DB_PATH=/app/data/music.db
      - JWT_SECRET=${JWT_SECRET:-insecure-default-change-in-production}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-}
      - SECURE_COOKIE=${SECURE_COOKIE:-true}
    restart: unless-stopped
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    environment:
      - SERVER_IP=${SERVER_IP:-127.0.0.1}
    volumes:
      - ssl_certs:/etc/nginx/ssl
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  db_data:
  ssl_certs:
