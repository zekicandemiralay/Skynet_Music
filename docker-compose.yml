services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      - ${MUSIC_DIR:-./music}:/music
      - db_data:/app/data
    environment:
      - PORT=3001
      - MUSIC_DIR=/music
      - DB_PATH=/app/data/music.db
    restart: unless-stopped
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "${APP_PORT:-4000}:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  db_data:
